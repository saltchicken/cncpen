globals:
  outline_simplify: 0.05
  no_outline: true
  feed: 1500

fills:
  - pattern: grid
    cell_size: 50.0
  - pattern: spiral
    use_previous_lines: true
    polygonize: true
    clip_local: true
    replace_previous: false
    spacing: 2.5
  - modification: simplify
    threshold: 0.2

  # - modification: optimize
