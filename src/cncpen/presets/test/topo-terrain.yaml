globals:
  feed: 1200.0
  no_outline: true

fills:
  # Modulate path height based on image darkness
  - operation: photo_wave
    image: images/loz.jpg
    amplitude: 4.0
    frequency: 0.15
    spacing: 2.0
    
  # Add slight organic jitter to the lines
  - operation: roughen
    variance: 0.25
    
  # Clean up the jitter to prevent the machine from stuttering
  - operation: simplify
    tolerance: 0.15
    preserve_topology: false
    
  - operation: optimize
