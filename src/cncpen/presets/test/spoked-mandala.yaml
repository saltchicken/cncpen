globals:
  outline_simplify: 0.1

fills:
  # Core radial geometry
  - operation: sacred
    type: seed_of_life
    spacing: 50

  # Continuous sweeping paths 
  - operation: spiral
    pitch: 20.0
    angle: 70.0
    spacing: 10
    resolution: 0.1

  # Warp the center outward
  - operation: fisheye
    strength: 1.5
    center_x: 0.0
    center_y: 0.0
    

  - operation: simplify
    tolerance: 0.5
    preserve_topology: false

  - operation: optimize
